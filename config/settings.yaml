# 币安量化交易系统配置

exchange:
  name: binance
  sandbox: true  # 是否使用测试网（生产环境改为 false）

strategy:
  name: ma_crossover
  symbol: BTC/USDT
  timeframe: 4h
  params:
    fast_ma: 7
    slow_ma: 25

risk:
  max_position_pct: 0.30       # 最大仓位占比 30%
  risk_per_trade_pct: 0.01     # 单笔风险 1%
  stop_loss_atr_mult: 2.0      # 止损 ATR 倍数
  take_profit_atr_mult: 4.0    # 止盈 ATR 倍数
  max_daily_loss_pct: 0.05     # 日最大亏损 5%
  max_drawdown_pct: 0.15       # 最大回撤 15% 暂停

fees:
  maker: 0.001    # 0.1%
  taker: 0.001    # 0.1%
  bnb_discount: true  # 使用 BNB 支付手续费享 25% 折扣

logging:
  level: INFO
  file: trading.log
